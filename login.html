<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Neon Studio</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
    .auth-link {
      color: var(--accent-primary);
      text-decoration: none;
    }
    .auth-link:hover {
      color: var(--accent-primary);
      text-shadow: 0 0 8px var(--neon-glow);
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body class="auth-layout" style="background: var(--bg-primary); padding: clamp(16px, 4vw, 24px); padding-top: 80px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">

  <!-- Fixed Top-Right Controls (Outside Card) -->
  <div style="position: absolute; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 12px;">
    <button class="btn-icon theme-toggle" title="Toggle Dark/Light Mode" style="background: var(--bg-card); border-color: var(--border-color); width: 40px; height: 40px; font-size: 18px;">◐</button>
    <button class="btn-icon rtl-toggle" title="Toggle RTL/LTR" style="background: var(--bg-card); border-color: var(--border-color); width: 40px; height: 40px; font-size: 18px;">⇄</button>
  </div>

  <div class="auth-card fade-up" style="box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid var(--border-color); border-radius: 24px; width: 100%; max-width: 500px; margin: 0 auto; padding: clamp(24px, 6vw, 48px);">
    <div class="text-center mb-8">
      <a href="index.html" class="nav-brand" style="justify-content: center; margin-bottom: 16px; white-space: nowrap; text-decoration: none;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0; margin-right: 4px;">
        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" stroke="var(--accent-primary)" fill="rgba(255, 94, 122, 0.1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 8px var(--accent-primary));"/>
      </svg>
        <span>NEON</span> STUDIO
      </a>
      <p style="color: var(--text-secondary);">Welcome back to the art of light.</p>
    </div>

    <form action="index.html" style="text-align: start;">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email address" required>
      </div>

      <div class="form-group" style="position: relative;">
        <label class="form-label" for="password">Password</label>
        <div style="position: relative;">
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required style="padding-inline-end: 48px;">
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)" style="position: absolute; inset-inline-end: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; margin-top: 16px; flex-wrap: nowrap; gap: 8px;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary); font-size: 14px; white-space: nowrap;">
          <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--accent-primary);"> Remember Me
        </label>
        <a href="#" class="auth-link" style="font-size: 14px; font-weight: 500; white-space: nowrap; transition: color 0.3s ease;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">Sign In</button>
      
      <div style="display: flex; align-items: center; margin: 24px 0;">
        <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        <span style="padding: 0 16px; color: var(--text-secondary); font-size: 14px;">Or continue with</span>
        <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
      </div>

      <div style="display: flex; gap: 12px;">
        <button type="button" class="btn btn-secondary" style="flex: 1; padding: 12px 8px; display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button type="button" class="btn btn-secondary" style="flex: 1; padding: 12px 8px; display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M15.42 12.01c0-2.4 1.95-3.56 2.05-3.62-1.12-1.63-2.86-1.85-3.5-1.88-1.5-.15-2.92.88-3.68.88-.76 0-1.93-.86-3.18-.84-1.61.02-3.1.94-3.93 2.38-1.7 2.94-.43 7.3 1.23 9.7.81 1.18 1.77 2.5 3.03 2.45 1.21-.05 1.68-.78 3.14-.78 1.45 0 1.88.78 3.16.76 1.3-.02 2.13-1.19 2.93-2.36 1.05-1.52 1.48-3 1.5-3.08-.03-.01-2.67-1.02-2.67-3.61v-.01zM11.97 7.02c.67-.81 1.12-1.94.99-3.06-1 .04-2.19.67-2.87 1.48-.6.71-1.13 1.86-.98 2.95 1.11.09 2.19-.55 2.86-1.37z" /></svg>
          Apple
        </button>
      </div>

      <p class="text-center" style="font-size: 15px; margin-top: 32px;">
        Don't have an account? <a href="register.html" class="auth-link" style="font-weight: 500; transition: color 0.3s ease;">Create Account</a>
      </p>
    </form>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }
  </script>
</body>
</html>
